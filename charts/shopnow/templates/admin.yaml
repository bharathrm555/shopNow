apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.admin.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.admin.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.admin.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.admin.name }}
    spec:
      containers:
      - name: admin
        image: {{ .Values.admin.image }}
        imagePullPolicy: Never
        ports:
        - containerPort: {{ .Values.admin.port }}
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.admin.port }}
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.admin.name }}-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.admin.name }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: {{ .Values.admin.port }}
  type: NodePort
